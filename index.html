<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠스베일리 1차 관리</title>

<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#f1f5f9; font-family:sans-serif; }
.unit-card { transition:0.2s; cursor:pointer; }
.unit-card:active { transform:scale(0.96); }
.empty { opacity:0.5; border:dashed 1px #ccc; }
</style>
</head>

<body>

<div class="p-4 bg-white shadow sticky top-0">
    <h1 class="text-lg font-bold">캠스베일리 1차 관리</h1>

    <div class="flex gap-2 mt-3">
        <button id="initBtn" class="bg-gray-700 text-white px-3 py-2 rounded text-xs">
            초기 세대 생성
        </button>

        <button id="syncBtn" class="bg-indigo-600 text-white px-3 py-2 rounded text-xs">
            동기화
        </button>
    </div>
</div>

<div class="p-4 grid grid-cols-2 gap-2" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "여기에 넣기",
    authDomain: "여기에 넣기",
    projectId: "여기에 넣기"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 동 리스트
const DONG_LIST = ["101","102","103","104","105"];

// 🔥 화면 렌더
async function loadData(){
    const snap = await getDocs(collection(db,"hos"));
    const list = snap.docs.map(d=>d.data());

    const grid = document.getElementById('grid');

    grid.innerHTML = list.map(v=>`
        <div class="unit-card p-3 bg-white rounded shadow ${(!v.ownerName)?'empty':''}">
            <div class="text-xs text-gray-400">${v.dong}동</div>
            <div class="text-lg font-bold">${v.ho}호</div>
            <div class="text-xs text-blue-600">${v.ownerName||'공실'}</div>
        </div>
    `).join('');
}

// 🔥 초기 세대 생성
document.getElementById('initBtn').onclick = async ()=>{
    if(!confirm("세대 초기 생성합니다")) return;

    let count = 0;

    for(const dong of DONG_LIST){
        for(let ho=101; ho<=120; ho++){

            const docId = `${dong}_${ho}`;

            await setDoc(doc(db,"hos",docId),{
                id: docId,
                dong: dong,
                ho: String(ho),
                ownerName: ""
            },{merge:true});

            count++;
        }
    }

    alert(count+"개 생성 완료");
    loadData();
};

// 🔥 동기화
document.getElementById('syncBtn').onclick = async ()=>{
    if(!confirm("동기화 시작")) return;

    for(const dong of DONG_LIST){

        try{
            const res = await fetch(`/api/sync?sigungu=44200&bjdong=34026&bun=1352&ji=0017&dongNm=${dong}`);
            const json = await res.json();

            const items = json.response?.body?.items?.item || [];

            for(const item of items){

                const d = item.dongNm.replace(/[^0-9]/g,"");
                const h = item.hoNm;

                const docId = `${d}_${h}`;

                await setDoc(doc(db,"hos",docId),{
                    id: docId,
                    dong: d,
                    ho: h,
                    ownerName: item.jmNm || ""
                },{merge:true});
            }

            console.log(dong+"동 완료");

        }catch(e){
            console.error(e);
        }
    }

    alert("동기화 완료");
    loadData();
};

loadData();

</script>
</body>
</html>
