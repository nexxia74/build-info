<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>캠스베일리 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 bg-gray-100">

<div class="flex gap-2 mb-4">
  <button id="syncBtn" class="bg-indigo-600 text-white px-3 py-2 rounded">
    동기화 실행
  </button>
</div>

<div id="grid" class="grid grid-cols-2 gap-2"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyBqsPgN2w6HOtU5T72roIc5LhU6AGbEo5g",
  authDomain: "build-info-cams.firebaseapp.com",
  projectId: "build-info-cams",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase 연결 완료");

// 🔥 화면 렌더
async function loadData(){
  const snap = await getDocs(collection(db,"hos"));
  const list = snap.docs.map(d=>d.data());

  document.getElementById('grid').innerHTML =
    list.sort((a,b)=>a.id>b.id?1:-1).map(v=>`
      <div class="p-3 rounded shadow ${v.ownerName?'bg-green-100':'bg-gray-200'}">
        <div class="text-xs text-gray-500">${v.dong}동</div>
        <div class="text-lg font-bold">${v.ho}호</div>
        <div class="text-xs text-blue-600">${v.ownerName||'공실'}</div>
      </div>
    `).join('');
}

// 🔥 동기화 (단일 지번)
document.getElementById('syncBtn').onclick = async ()=>{
  console.log("🔥 동기화 시작");

  try{
    const url = `/api/sync?sigungu=44200&bjdong=34026&bun=1352&ji=0017`;
    console.log("요청:", url);

    const res = await fetch(url);

    if(!res.ok){
      console.error("❌ API 실패", res.status);
      alert("API 실패");
      return;
    }

    const json = await res.json();
    console.log("응답:", json);

    if(!json.items || json.items.length === 0){
      alert("데이터 없음 (지번 또는 코드 확인 필요)");
      return;
    }

    // 🔥 Firebase 저장
    for(const item of json.items){
      const d = (item.dongNm||"").replace(/[^0-9]/g,"");
      const h = item.hoNm;

      if(!d || !h) continue;

      const docId = `${d}_${h}`;

      await setDoc(doc(db,"hos",docId),{
        id:docId,
        dong:d,
        ho:h,
        ownerName:item.jmNm||"",
      },{merge:true});
    }

    alert("동기화 완료");
    loadData();

  }catch(e){
    console.error("🔥 에러:", e);
    alert("에러 발생");
  }
};

loadData();
</script>

</body>
</html>
