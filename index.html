<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "여기",
  authDomain: "여기",
  projectId: "여기"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADDR = { sigungu:'44200', bjdong:'34026', bun:'1352', ji:'0017' };

// 🔥 화면 렌더
async function loadData(){
  const snap = await getDocs(collection(db,"hos"));
  const list = snap.docs.map(d=>d.data());

  document.getElementById('grid').innerHTML =
    list.sort((a,b)=>a.id>b.id?1:-1).map(v=>`
      <div class="p-3 rounded shadow ${v.ownerName?'bg-green-100':'bg-gray-100'}">
        <div class="text-xs">${v.dong}동</div>
        <div class="text-lg font-bold">${v.ho}호</div>
        <div class="text-xs">${v.ownerName||'공실'}</div>
      </div>
    `).join('');
}

// 🔥 초기 생성
document.getElementById('initBtn').onclick = async ()=>{
  const batch = writeBatch(db);

  for(let d=101; d<=110; d++){
    for(let h=101; h<=120; h++){
      const docId = `${d}_${h}`;
      batch.set(doc(db,"hos",docId),{
        id:docId,
        dong:String(d),
        ho:String(h)
      },{merge:true});
    }
  }

  await batch.commit();
  alert("초기 생성 완료");
  loadData();
};

// 🔥 동기화 (전체 한번)
document.getElementById('syncBtn').onclick = async ()=>{
  const res = await fetch(`/api/sync?sigungu=${ADDR.sigungu}&bjdong=${ADDR.bjdong}&bun=${ADDR.bun}&ji=${ADDR.ji}`);
  const json = await res.json();

  const batch = writeBatch(db);

  json.items.forEach(item=>{
    const d = item.dongNm.replace(/[^0-9]/g,"");
    const h = item.hoNm;

    if(!d || !h) return;

    const docId = `${d}_${h}`;

    batch.set(doc(db,"hos",docId),{
      id:docId,
      dong:d,
      ho:h,
      ownerName:item.jmNm||"",
      area:item.area||""
    },{merge:true});
  });

  await batch.commit();

  alert("동기화 완료");
  loadData();
};

loadData();
</script>
