<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>캠스베일리 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 bg-gray-100">

<div class="flex gap-2 mb-4">
  <button id="syncBtn" class="bg-indigo-600 text-white px-3 py-2 rounded">
    자동 동기화
  </button>
</div>

<div id="grid" class="grid grid-cols-2 gap-2"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, writeBatch } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyBqsPgN2w6HOtU5T72roIc5LhU6AGbEo5g",
  authDomain: "build-info-cams.firebaseapp.com",
  projectId: "build-info-cams",
  storageBucket: "build-info-cams.firebasestorage.app",
  messagingSenderId: "27137400811",
  appId: "1:27137400811:web:cae4a647edf2895f9243ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase 연결 완료");

// 🔥 화면 렌더
async function loadData(){
  const snap = await getDocs(collection(db,"hos"));
  const list = snap.docs.map(d=>d.data());

  document.getElementById('grid').innerHTML =
    list.sort((a,b)=>a.id>b.id?1:-1).map(v=>`
      <div class="p-3 rounded shadow ${v.ownerName?'bg-green-100':'bg-gray-200'}">
        <div class="text-xs text-gray-500">${v.dong}동</div>
        <div class="text-lg font-bold">${v.ho}호</div>
        <div class="text-xs text-blue-600">${v.ownerName||'공실'}</div>
      </div>
    `).join('');
}

// 🔥 완전 자동 동기화
document.getElementById('syncBtn').onclick = async ()=>{
  try{
    const batch = writeBatch(db);

    // 🔥 지번 자동 탐색 범위 (넉넉히)
    for(let ji=1; ji<=50; ji++){

      const jiStr = String(ji).padStart(4,'0');

      const res = await fetch(`/api/sync?sigungu=44200&bjdong=34026&bun=1352&ji=${jiStr}`);
      const json = await res.json();

      if(!json.items || json.items.length === 0) continue;

      json.items.forEach(item=>{
        const d = (item.dongNm||"").replace(/[^0-9]/g,"");
        const h = item.hoNm;

        // 🔥 필터 (이상 데이터 제거)
        if(!d || !h || d.length > 4) return;

        const docId = `${d}_${h}`;

        batch.set(doc(db,"hos",docId),{
          id:docId,
          dong:d,
          ho:h,
          ownerName:item.jmNm||"",
          area:item.area||"",
          lastSync:new Date().toISOString()
        },{merge:true});
      });
    }

    await batch.commit();

    alert("자동 동기화 완료");
    loadData();

  }catch(e){
    console.error(e);
    alert("동기화 실패");
  }
};

loadData();
</script>

</body>
</html>
